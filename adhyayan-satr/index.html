<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap');
  :root{--red:#CC0000;--orange:#FF6600;--yellow:#FFD700;--white:#FFFFFF;--cream:#FFF8E7;--dark-red:#8B0000;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Serif Devanagari',serif;background:var(--cream);color:#3a1a00;min-height:100vh;}
  header{background:linear-gradient(135deg,var(--dark-red) 0%,var(--red) 40%,var(--orange) 70%,var(--yellow) 100%);padding:28px 20px 22px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.25);}
  header h1{font-size:clamp(1.3rem,4vw,2rem);color:var(--white);text-shadow:1px 1px 4px rgba(0,0,0,.4);font-weight:700;}
  header p{font-size:clamp(.8rem,2.5vw,1rem);color:var(--yellow);margin-top:6px;font-family:'Noto Sans Devanagari',sans-serif;}
  .back-btn{display:inline-block;margin:16px 20px 4px;padding:6px 16px;background:var(--red);color:#fff;border-radius:20px;text-decoration:none;font-size:.9rem;font-family:'Noto Sans Devanagari',sans-serif;}
  .back-btn:hover{background:var(--dark-red);}
  .list-header{padding:12px 20px 8px;font-size:1rem;font-family:'Noto Sans Devanagari',sans-serif;color:var(--dark-red);font-weight:600;}
  .sessions{display:flex;flex-direction:column;gap:12px;padding:8px 16px 40px;max-width:780px;margin:0 auto;}
  .session-card{display:block;background:#fff;border-radius:10px;padding:16px 18px;text-decoration:none;color:inherit;border-left:5px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .15s,box-shadow .15s;}
  .session-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.14);}
  .card-date{font-size:.85rem;color:#a05000;font-family:'Noto Sans Devanagari',sans-serif;margin-bottom:4px;}
  .card-title{font-size:1rem;font-weight:600;line-height:1.45;}
  .card-arrow{float:right;color:var(--orange);font-size:1.2rem;}
</style>
</head>
